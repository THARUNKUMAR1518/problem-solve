name: Hourly Contribution

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update file
        run: |
          mkdir -p reports
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> reports/hourly-report.txt

      - name: Commit changes
        run: |
          git add reports/hourly-report.txt
          git commit -m "Hourly contribution $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0

      - name: Push changes
        run: |
          git push
